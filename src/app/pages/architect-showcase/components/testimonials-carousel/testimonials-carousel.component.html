<div class="heading">
  <p class="eyebrow">Depoimentos</p>
  <h2>Resultados percebidos por liderancas de produto e tecnologia</h2>
</div>

<article class="carousel-card" *ngIf="testimonials.length">
  <p class="quote">"{{ testimonials[activeIndex].quote }}"</p>
  <p class="author">{{ testimonials[activeIndex].name }}</p>
  <p class="meta">{{ testimonials[activeIndex].role }} - {{ testimonials[activeIndex].company }}</p>

  <div class="controls">
    <button type="button" (click)="prev()" aria-label="Depoimento anterior">Anterior</button>
    <button type="button" (click)="next()" aria-label="Proximo depoimento">Proximo</button>
  </div>

  <div class="dots" role="tablist" aria-label="Indicadores de depoimentos">
    <button
      type="button"
      *ngFor="let testimonial of testimonials; let i = index"
      [class.active]="i === activeIndex"
      (click)="goTo(i)"
      [attr.aria-label]="'Ir para depoimento ' + (i + 1)">
    </button>
  </div>
</article>
